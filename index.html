<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق تتبع استهلاك الأصناف</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
      }
    </script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
            margin: 0 auto 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #007bff;
            padding-bottom: 20px;
        }
        .header h1 {
            color: #007bff;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 3px solid #e9ecef;
        }
        .tab-btn {
            padding: 15px 30px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #007bff;
            border-bottom-color: #007bff;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .item-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
        }
        .item-card:hover {
            border-color: #007bff;
            box-shadow: 0 5px 15px rgba(0,123,255,0.2);
            background: #f0f7ff;
        }
        .item-card label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .item-card input {
            width: 100%;
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            direction: ltr; 
        }
        .item-card input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,123,255,0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            width: 95%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #28a745;
            padding-bottom: 20px;
        }
        .modal-header h2 {
            color: #28a745;
            font-weight: 700;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 12px;
            border-right: 4px solid #007bff;
        }
        .summary-item-qty {
            background: #007bff;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
        }
        .modal-footer {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .modal-footer button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-edit {
            background: #e9ecef;
            color: #333;
        }
        .btn-edit:hover { background: #dee2e6; }
        .btn-confirm {
            background: #28a745;
            color: white;
        }
        .btn-confirm:hover { background: #218838; }
        .success-message {
            text-align: center;
            padding: 40px 20px;
        }
        .success-icon {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .day-block {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        .day-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #007bff;
        }
        .btn-print {
            background: #17a2b8;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-print:hover { background: #138496; }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .history-item:last-child { border-bottom: none; }
        .history-item-qty {
            color: #007bff;
            font-weight: 700;
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }
        .btn-clear {
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
        }
        .btn-clear:hover { background: #c82333; }

        @media print {
            body * { visibility: hidden; }
            .print-active, .print-active * { visibility: visible; }
            .print-active { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
                margin: 0;
                border: none;
                background: white;
            }
            .no-print { display: none !important; }
            body { background: white; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header no-print">
            <h1>📦 تطبيق تتبع الاستهلاك اليومي</h1>
            <p>تسجيل وتتبع استهلاك الأصناف - 7 أيام</p>
        </div>
        
        <div class="tabs no-print">
            <button class="tab-btn active" onclick="switchTab(0)">إدخال البيانات</button>
            <button class="tab-btn" onclick="switchTab(1)">السجل التاريخي</button>
        </div>
        
        <div class="tab-content active no-print" id="tab-input">
            <!-- إضافة autocomplete="off" للفورم بالكامل -->
            <form id="consumptionForm" autocomplete="off">
                <div class="items-grid" id="itemsGrid"></div>
                <button type="submit" class="btn-submit">✓ تأكيد السحب</button>
            </form>
        </div>
        
        <div class="tab-content" id="tab-history">
            <div id="historyContainer" class="empty-state">
                <p>⏳ جاري تحميل السجل من السيرفر...</p>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay no-print" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✓ تأكيد الطلب</h2>
                <p>يرجى مراجعة البيانات</p>
            </div>
            <div id="summaryList"></div>
            <div class="modal-footer">
                <button class="btn-edit" onclick="closeModal()">← تعديل</button>
                <button class="btn-confirm" onclick="confirmOrder()">✓ حفظ في السيرفر</button>
            </div>
        </div>
    </div>
    
    <script>
        const ITEMS = ["بيتي","كل يوم","زبادي سادة","زبادي فراولة","زبادي كبير","دانيت","زبادو كبير","زبادو صغير","لبن مراعي لتر","لبن مراعي لتر ونص","لبن بخيره","عصير لتر","جبنة صغير فلفل","جبنة صغير فيتا","جبنة كبير فلفل","جبنة كبير فيتا","جبنة مراعي نص","جبنة مراعي ربع","جبنة مراعي ثمن","مخلل كبير","مخلل سكينة","مخلل لوكس صغير","مخلل بوليف صغير","فليتو فلفل","فليتو زيتون","شيف","حكاية فلفل","حكاية زيتون","حكاية بيور", "حلاوة", "مخلل من غير لمون", "جبنة قديمة", "لهاليبو", "تريتس 105", "تريتس 70", "محليات"];
        
        let selectedItems = {};
        const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;
        let db = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            loadItems();
            
            try {
                if (typeof firebase !== 'undefined') {
                    const firebaseConfig = {
                        apiKey: "AIzaSyAR4A95R7bemGwWITN7h6CzYoQLNVHOdkw",
                        authDomain: "inventory-tracker-d5213.firebaseapp.com",
                        projectId: "inventory-tracker-d5213",
                        storageBucket: "inventory-tracker-d5213.firebasestorage.app",
                        messagingSenderId: "979755761881",
                        appId: "1:979755761881:web:18a01acdfe05190c047ec8"
                    };
                    firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();

                    db.enablePersistence().catch((err) => {
                        console.log("Offline persistence error: ", err.code);
                    });

                    loadHistory();
                } else {
                    document.getElementById('historyContainer').innerHTML = '<div class="empty-state"><p>⚠️ تحذير: المتصفح يمنع الاتصال بقاعدة البيانات. تأكد من اتصال الإنترنت.</p></div>';
                }
            } catch (error) {
                console.error("Firebase Connection Error: ", error);
            }

            document.getElementById('consumptionForm').addEventListener('submit', handleSubmit);
            document.getElementById('confirmModal').addEventListener('click', e => {
                if (e.target.id === 'confirmModal') closeModal();
            });
        });
        
        function loadItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';
            ITEMS.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                // الخدعة هنا: إعطاء اسم عشوائي واستخدام new-password
                const randomName = 'field_' + Math.floor(Math.random() * 1000000);
                card.innerHTML = `
                    <label for="item_${i}">${item}</label>
                    <input type="text" id="item_${i}" name="${randomName}" placeholder="0" autocomplete="new-password" autocorrect="off" spellcheck="false">
                `;
                grid.appendChild(card);
            });
        }
        
        function handleSubmit(e) {
            e.preventDefault();
            selectedItems = {};
            let hasItems = false;
            
            ITEMS.forEach((item, i) => {
                const rawValue = document.getElementById(`item_${i}`).value.trim();
                if (rawValue !== "" && rawValue !== "0") {
                    selectedItems[item] = rawValue;
                    hasItems = true;
                }
            });
            
            if (!hasItems) {
                alert('أدخل كمية واحدة على الأقل!');
                return;
            }
            showModal();
        }
        
        function showModal() {
            const list = document.getElementById('summaryList');
            list.innerHTML = '';
            for (const [item, qty] of Object.entries(selectedItems)) {
                const div = document.createElement('div');
                div.className = 'summary-item';
                div.innerHTML = `<span>${item}</span><span class="summary-item-qty">${qty}</span>`;
                list.appendChild(div);
            }
            document.getElementById('confirmModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }
        
        function confirmOrder() {
            if (!db) {
                alert("لا يوجد اتصال بقاعدة البيانات! لا يمكن الحفظ الآن.");
                return;
            }

            const data = {
                timestamp: new Date().toISOString(),
                timestampMs: Date.now(),
                items: selectedItems
            };
            
            db.collection("history").add(data).then(() => {
                const list = document.getElementById('summaryList');
                list.innerHTML = `
                    <div class="success-message">
                        <div class="success-icon">✓</div>
                        <h3>تم الحفظ بنجاح!</h3>
                        <p>سيتم الإغلاق بعد 3 ثوانٍ</p>
                    </div>
                `;
                
                document.getElementById('consumptionForm').reset();
                setTimeout(() => {
                    closeModal();
                    loadHistory();
                    switchTab(0);
                }, 3000);
            }).catch(error => {
                alert("حدث خطأ في الاتصال بالسيرفر: " + error.message);
            });
        }
        
        function printRecord(btnElement) {
            const blockToPrint = btnElement.closest('.day-block');
            document.querySelectorAll('.day-block').forEach(b => b.classList.remove('print-active'));
            blockToPrint.classList.add('print-active');
            window.print();
            setTimeout(() => {
                blockToPrint.classList.remove('print-active');
            }, 500);
        }

        function loadHistory() {
            if (!db) return;
            
            const container = document.getElementById('historyContainer');
            container.innerHTML = '<div class="empty-state"><p>⏳ جاري تحميل السجل...</p></div>';
            
            db.collection("history").orderBy("timestampMs", "desc").get().then((querySnapshot) => {
                container.innerHTML = '';
                let hasData = false;
                const now = Date.now();

                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="empty-state"><p>لا توجد سجلات</p></div>';
                    return;
                }
                
                querySnapshot.forEach((doc) => {
                    const entry = doc.data();
                    
                    if ((now - entry.timestampMs) >= SEVEN_DAYS_MS) {
                        doc.ref.delete(); 
                        return; 
                    }
                    
                    hasData = true;
                    const dateObj = new Date(entry.timestamp);
                    const dateStr = dateObj.toLocaleDateString('ar-EG');
                    const timeStr = dateObj.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                    
                    const block = document.createElement('div');
                    block.className = 'day-block';
                    
                    let html = `
                        <div class="day-title">
                            <span>${dateStr} - الساعة ${timeStr}</span>
                            <button class="btn-print no-print" onclick="printRecord(this)">🖨️ طباعة</button>
                        </div>
                    `;
                    
                    for (const [item, qty] of Object.entries(entry.items)) {
                        html += `<div class="history-item"><span>${item}</span><span class="history-item-qty">${qty}</span></div>`;
                    }
                    block.innerHTML = html;
                    container.appendChild(block);
                });
                
                if (!hasData) {
                    container.innerHTML = '<div class="empty-state"><p>لا توجد سجلات</p></div>';
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'btn-clear no-print';
                    btn.textContent = '🗑️ مسح جميع السجلات للسيرفر بالكامل';
                    btn.onclick = () => {
                        if (confirm('هل أنت متأكد؟ هذا سيمسح البيانات من عند جميع الأجهزة!')) {
                            container.innerHTML = '<div class="empty-state"><p>⏳ جاري المسح...</p></div>';
                            db.collection("history").get().then((res) => {
                                res.forEach(element => {
                                    element.ref.delete();
                                });
                                setTimeout(loadHistory, 1500);
                            });
                        }
                    };
                    btn.style.width = '100%';
                    btn.style.marginTop = '30px';
                    container.appendChild(btn);
                }
            }).catch(error => {
                container.innerHTML = '<div class="empty-state"><p>❌ حدث خطأ في تحميل السجل.</p></div>';
                console.error("Firebase Error:", error);
            });
        }
        
        function switchTab(i) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (i === 0) {
                document.getElementById('tab-input').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('tab-history').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                if(db) loadHistory();
            }
        }
    </script>
</body>
</html>
